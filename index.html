<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜の動物診断 — あなたの恋愛本能を解剖する</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;600&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060f;
  --surface:rgba(255,255,255,0.03);
  --border:rgba(201,169,110,0.15);
  --gold:#c9a96e;
  --gold-dim:rgba(201,169,110,0.25);
  --text:#ede5d8;
  --dim:rgba(237,229,216,0.5);
  --moon:#f0e6c8;
}
html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Serif JP',serif;
  overflow-x:hidden;
}
canvas#bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}
#app{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:32px 24px;
}
.screen{
  width:100%;max-width:440px;
  animation:appear .65s cubic-bezier(.16,1,.3,1) both;
}
@keyframes appear{
  from{opacity:0;transform:translateY(28px) scale(.97)}
  to{opacity:1;transform:none}
}
/* ---- TITLE ---- */
.title-moon{
  font-size:68px;text-align:center;
  margin-bottom:20px;
  display:block;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 0 24px rgba(240,230,200,.5));
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.title-en{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(16px,4.5vw,24px);
  text-align:center;color:var(--gold);
  letter-spacing:.12em;
  text-shadow:0 0 32px var(--gold-dim);
  margin-bottom:6px;
}
.title-ja{
  font-size:12px;text-align:center;
  color:var(--dim);letter-spacing:.2em;
  font-weight:200;margin-bottom:36px;
}
.line{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.3;margin:20px 0;
}
.intro{
  font-size:13px;line-height:2.1;
  text-align:center;color:var(--dim);
  font-weight:200;margin-bottom:36px;
}
.intro em{font-style:normal;color:var(--text);font-weight:300;}
.btn{
  display:block;width:100%;padding:17px;
  background:transparent;border:1px solid var(--gold);
  color:var(--gold);
  font-family:'Noto Serif JP',serif;
  font-size:14px;letter-spacing:.2em;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:color .35s;
}
.btn::after{
  content:'';position:absolute;inset:0;
  background:var(--gold);
  transform:translateX(-101%);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
  z-index:-1;
}
.btn:hover{color:var(--bg);}
.btn:hover::after{transform:none}
/* ---- PROGRESS ---- */
.prog{margin-bottom:28px}
.prog-nums{
  font-size:11px;color:var(--dim);
  letter-spacing:.15em;text-align:right;margin-bottom:7px;
}
.prog-track{height:1px;background:rgba(201,169,110,.12);position:relative}
.prog-fill{
  position:absolute;top:0;left:0;height:100%;
  background:var(--gold);
  transition:width .6s cubic-bezier(.16,1,.3,1);
  box-shadow:0 0 8px var(--gold-dim);
}
/* ---- QUESTION ---- */
.q-label{
  font-size:10px;color:var(--gold);
  letter-spacing:.28em;margin-bottom:14px;opacity:.7;
}
.q-text{
  font-size:17px;line-height:1.85;
  font-weight:300;margin-bottom:28px;
}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  padding:15px 18px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'Noto Serif JP',serif;
  font-size:13px;text-align:left;
  cursor:pointer;
  line-height:1.65;
  position:relative;overflow:hidden;
  transition:all .2s;
}
.opt::before{
  content:'';position:absolute;
  left:0;top:0;bottom:0;width:2px;
  background:var(--gold);
  transform:scaleY(0);
  transition:transform .25s;
}
.opt:hover{
  border-color:rgba(201,169,110,.38);
  background:rgba(201,169,110,.05);
  transform:translateX(5px);
}
.opt:hover::before,.opt.picked::before{transform:scaleY(1)}
.opt.picked{
  border-color:var(--gold);
  background:rgba(201,169,110,.08);
  transform:translateX(5px);
  pointer-events:none;
}
/* ---- LOADING ---- */
.loading{text-align:center;padding:72px 0}
.ld-moon{
  font-size:60px;display:block;margin-bottom:24px;
  animation:pulsemoon 1.8s ease-in-out infinite;
}
@keyframes pulsemoon{
  0%,100%{filter:brightness(.6);transform:scale(.9)}
  50%{filter:brightness(1.3) drop-shadow(0 0 22px rgba(240,230,200,.8));transform:scale(1.1)}
}
.ld-text{
  font-size:12px;color:var(--dim);
  letter-spacing:.22em;
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
/* ---- RESULT ---- */
.r-animal{
  font-size:82px;text-align:center;margin-bottom:14px;
  filter:drop-shadow(0 0 32px rgba(201,169,110,.45));
  animation:reveal .9s cubic-bezier(.16,1,.3,1) both;
}
@keyframes reveal{
  from{opacity:0;transform:scale(.4) rotate(-12deg)}
  to{opacity:1;transform:none}
}
.r-tag{
  font-size:10px;text-align:center;
  color:var(--gold);letter-spacing:.28em;
  opacity:.7;margin-bottom:7px;
}
.r-name-en{
  font-family:'Cinzel Decorative',serif;
  font-size:20px;text-align:center;
  color:var(--gold);
  text-shadow:0 0 22px var(--gold-dim);
  letter-spacing:.1em;margin-bottom:4px;
}
.r-name-ja{
  font-size:12px;text-align:center;
  color:var(--dim);letter-spacing:.22em;margin-bottom:22px;
}
.r-card{
  background:var(--surface);
  border:1px solid var(--border);
  padding:22px;margin-bottom:16px;
}
.r-tagline{
  font-size:14px;line-height:2.1;
  text-align:center;color:var(--moon);
  margin-bottom:18px;font-weight:200;
}
.r-sec{margin-bottom:14px}
.r-sec-label{
  font-size:10px;color:var(--gold);
  letter-spacing:.25em;margin-bottom:7px;opacity:.8;
}
.r-sec-text{
  font-size:13px;line-height:1.95;
  color:var(--dim);font-weight:200;
}
.share-box{
  background:rgba(201,169,110,.04);
  border:1px solid var(--border);
  padding:18px;margin-bottom:14px;
}
.share-label{
  font-size:10px;color:var(--dim);
  letter-spacing:.15em;margin-bottom:11px;
}
.share-text{
  font-size:12px;line-height:1.85;
  color:var(--text);white-space:pre-wrap;
  font-family:'Noto Serif JP',serif;
}
.btn-copy{
  display:block;width:100%;padding:15px;
  background:var(--gold);border:none;
  color:var(--bg);
  font-family:'Noto Serif JP',serif;
  font-size:13px;letter-spacing:.16em;
  cursor:pointer;
  transition:all .3s;margin-bottom:10px;
}
.btn-copy:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-copy.done{background:#6bcb8b;color:#0a1f0f}
.btn-retry{
  display:block;width:100%;padding:14px;
  background:transparent;
  border:1px solid rgba(201,169,110,.28);
  color:var(--dim);
  font-family:'Noto Serif JP',serif;
  font-size:13px;letter-spacing:.16em;
  cursor:pointer;
  transition:all .3s;
}
.btn-retry:hover{border-color:var(--gold);color:var(--gold)}
.note-cta{
  text-align:center;
  font-size:11px;color:var(--dim);
  letter-spacing:.1em;
  margin-top:18px;line-height:1.9;
}
.note-cta a{color:var(--gold);text-decoration:none}
.note-cta a:hover{text-decoration:underline}
.share-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.btn-sns{
  padding:14px 8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);
  font-family:'Noto Serif JP',serif;
  font-size:12px;letter-spacing:.1em;cursor:pointer;
  transition:all .25s;text-align:center;text-decoration:none;
  display:block;
}
.btn-sns:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,169,110,.06)}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="app"></div>

<script>
/* ---- STARS ---- */
const cv = document.getElementById('bg');
const cx = cv.getContext('2d');
function rsz(){cv.width=innerWidth;cv.height=innerHeight}
rsz();addEventListener('resize',rsz);
const ST = Array.from({length:200},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*1.1+.2,
  a:Math.random()*Math.PI*2,
  sp:Math.random()*.004+.001
}));
(function draw(){
  cx.clearRect(0,0,cv.width,cv.height);
  ST.forEach(s=>{
    s.a+=s.sp;
    const al=(Math.sin(s.a)+1)/2*.55+.08;
    cx.beginPath();
    cx.arc(s.x*cv.width,s.y*cv.height,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(240,228,196,${al})`;
    cx.fill();
  });
  requestAnimationFrame(draw);
})();

/* ---- DATA ---- */
const Qs = [
  {
    t:"好きな人ができたとき、あなたはどうする？",
    o:[
      {t:"気づかれないように、ずっと観察してしまう",s:[2,0,0,0,0,2]},
      {t:"自分から積極的に仕掛けていく",s:[0,2,0,2,0,0]},
      {t:"まず友達として仲良くなろうとする",s:[0,0,1,0,2,1]},
      {t:"なぜか、距離を置いてしまう",s:[1,0,2,0,0,1]},
    ]
  },
  {
    t:"恋愛中、一番しんどいのは？",
    o:[
      {t:"束縛されること",s:[1,1,2,0,0,0]},
      {t:"無視されること",s:[0,0,0,1,2,0]},
      {t:"嘘をつかれること",s:[2,1,0,0,0,1]},
      {t:"自分の気持ちがわからなくなること",s:[1,0,1,0,0,2]},
    ]
  },
  {
    t:"深夜、ひとりで目が覚めたとき、何を考える？",
    o:[
      {t:"あの人、今何してるかな",s:[0,0,0,1,2,0]},
      {t:"何も考えたくない、ただ消えたい",s:[2,0,0,0,0,2]},
      {t:"次の動き、作戦を考えはじめる",s:[0,2,1,1,0,0]},
      {t:"過去の後悔が頭をよぎる",s:[1,0,0,0,1,2]},
    ]
  },
  {
    t:"恋愛で、相手に求めるものは？",
    o:[
      {t:"刺激と、自由",s:[0,1,2,1,0,0]},
      {t:"深い理解と共鳴",s:[1,0,0,0,0,2]},
      {t:"独占と情熱",s:[0,0,0,2,1,0]},
      {t:"安心できる、ただの存在感",s:[1,0,0,0,2,0]},
    ]
  },
  {
    t:"「沼」にはまるパターンは？",
    o:[
      {t:"冷たいのに、時々だけ優しい人",s:[2,0,0,0,1,1]},
      {t:"自分だけを特別扱いしてくれる人",s:[0,1,0,1,2,0]},
      {t:"掴めない、自由な雰囲気の人",s:[0,1,2,0,1,0]},
      {t:"全部見透かしてくれる人",s:[1,0,0,1,0,2]},
    ]
  },
  {
    t:"恋愛でやりがちなのは？",
    o:[
      {t:"好きになると、気づいたら重くなる",s:[0,0,0,1,2,0]},
      {t:"好きになると、逃げたくなる",s:[2,0,1,0,0,1]},
      {t:"相手に合わせすぎて自分を失う",s:[0,0,0,0,1,2]},
      {t:"感情を隠して、平静を装う",s:[1,2,0,0,0,1]},
    ]
  },
  {
    t:"あなたにとって、恋愛とは？",
    o:[
      {t:"自分を超える、体験",s:[0,1,1,2,0,0]},
      {t:"静かに、深く満たされるもの",s:[1,0,0,0,0,2]},
      {t:"複雑で、でも手放せないもの",s:[1,1,0,0,2,0]},
      {t:"まだ、よくわからない",s:[2,0,1,0,0,1]},
    ]
  }
];

const RS = [
  {
    em:"🐱",en:"Night Cat",ja:"夜の黒猫",
    tl:"近づくと逃げる。\nでも、追われたい。\n誰も見えていないのに、全部見えている。",
    love:"「好きだから距離を置く」を繰り返す。本当は誰より深く愛されたいのに、そばに来られると冷めてしまう。近すぎると消えたくなる、でも離れると寂しい。",
    trap:"冷たいのに一瞬だけ優しい人。その隙間に全部持っていかれる。分かっていても、また同じ人を好きになる。",
    note:"あなたが誰かを本気で好きになるとき、それは静かで取り消せない。その静けさを、ちゃんと受け取れる人がいる。"
  },
  {
    em:"🦊",en:"White Fox",ja:"月夜の白狐",
    tl:"誰も気づいていない。\nでも、あなたはずっと仕掛けていた。\n恋愛は最初から、戦略だった。",
    love:"感情を見せることが苦手。でも誰よりも相手のことを読んでいる。好かれてから本番が始まるタイプ。",
    trap:"自分より賢い人、または自分が読めない人。制御できないと感じた瞬間に落ちる。負けたくないから、離れられない。",
    note:"あなたの恋愛に「偶然」はない。すべて、あなたが選んでいる。その選択の重さを、誰かに知ってほしいと思っている。"
  },
  {
    em:"🦋",en:"Night Butterfly",ja:"夜蝶",
    tl:"捕まえた瞬間、もういない。\nでも、あなたの周りにはいつもいる。\nそれが、あなたの恋愛。",
    love:"「重い関係」が苦手で、自由を奪われると消えてしまう。でも繋がっていたい気持ちは誰より強い。矛盾の中に住んでいる。",
    trap:"追いかけてくれる人。捕まえられそうになると逃げる。その繰り返しが、いつのまにか依存になる。",
    note:"あなたが求めているのは、自由と愛を同時にくれる誰か。それは稀少。だからあなたはいつも、少しだけ迷子。"
  },
  {
    em:"🐺",en:"Moon Wolf",ja:"月夜の狼",
    tl:"全部か、ゼロか。\n中間がわからない。\n愛するとき、あなたは本能で動く。",
    love:"好きになったら独占したくなる。相手の全部が欲しい。それが重いとわかっていても、止められない。",
    trap:"自分に懐いてくれる人、または同じ強さを持っている人。「この人だけ」と決めたら、もう取り消せない。",
    note:"あなたの愛は激しくて、温かい。でもその熱さが、時に相手を包みすぎることもある。"
  },
  {
    em:"🐰",en:"Moon Rabbit",ja:"月の兎",
    tl:"可愛い顔して、実は一番深いところにいる。\n誰より優しくて、誰より執着している。",
    love:"相手に全力で尽くす。でもその裏に「見捨てられたくない」が常にある。気づかれていないと思っている。気づかれている。",
    trap:"自分を特別扱いしてくれる人。一度「自分だけ」と感じさせてくれたら、もう抜けられない。",
    note:"あなたの愛の深さは本物。でもその深さは、ときどき相手を溺れさせてしまう。それも愛だと、誰かが言ってくれるといい。"
  },
  {
    em:"🦌",en:"White Deer",ja:"夜の白鹿",
    tl:"遠くにいるから、美しい。\n近づくたびに消えていく。\nでも、あなたはちゃんとここにいる。",
    love:"感情の起伏は少ないが、内側では常に深く考えている。「理解してほしい」けど、説明が苦手。だから孤独になりやすい。",
    trap:"自分の世界観を肯定してくれる人。「わかってくれた」と感じた瞬間に、もう逃げられなくなる。",
    note:"あなたを本当に好きな人は、あなたの沈黙の意味を読める人。その人は少ない。だから出会いは、稀少で、特別。"
  }
];

/* ---- STATE ---- */
let qi=0, sc=[0,0,0,0,0,0];
const app=document.getElementById('app');

function render(html){
  app.innerHTML=`<div class="screen">${html}</div>`;
}

/* ---- TITLE ---- */
function showTitle(){
  render(`
    <span class="title-moon">🌙</span>
    <div class="title-en">夜の動物診断</div>
    <div class="title-ja">— YOUR NIGHT ANIMAL —</div>
    <div class="line"></div>
    <p class="intro">
      あなたの恋愛の<em>本能</em>は、<br>
      どんな夜の生き物に似ているだろう。<br><br>
      <span style="font-size:11px;opacity:.5;">7問 / 約3分</span>
    </p>
    <button class="btn" onclick="start()">診断をはじめる</button>
  `);
}

/* ---- START ---- */
function start(){qi=0;sc=[0,0,0,0,0,0];showQ()}

/* ---- QUESTION ---- */
function showQ(){
  const q=Qs[qi];
  const pct=(qi/Qs.length*100).toFixed(0);
  render(`
    <div class="prog">
      <div class="prog-nums">${qi+1} / ${Qs.length}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-label">Q U E S T I O N</div>
    <div class="q-text">${q.t}</div>
    <div class="opts">
      ${q.o.map((o,i)=>`<button class="opt" onclick="pick(${i})">${o.t}</button>`).join('')}
    </div>
  `);
}

function pick(i){
  const btns=document.querySelectorAll('.opt');
  btns[i].classList.add('picked');
  Qs[qi].o[i].s.forEach((v,k)=>sc[k]+=v);
  setTimeout(()=>{
    qi++;
    qi>=Qs.length?loading():showQ();
  },380);
}

/* ---- LOADING ---- */
function loading(){
  render(`
    <div class="loading">
      <span class="ld-moon">🌕</span>
      <div class="ld-text">解析中 ...</div>
    </div>
  `);
  setTimeout(showResult,2200);
}

/* ---- RESULT ---- */
function showResult(){
  const mx=Math.max(...sc);
  const r=RS[sc.indexOf(mx)];
  const NOTE_URL='https://kurokikaren000.github.io/yoru-shindan';
  const shareText=`🌙 夜の動物診断\n\n私は「${r.ja}」でした\n\n${r.tl}\n\nあなたは何タイプ？↓\n${NOTE_URL}`;
  const enc=encodeURIComponent(shareText);
  render(`
    <div class="r-animal">${r.em}</div>
    <div class="r-tag">Y O U R  N I G H T  A N I M A L</div>
    <div class="r-name-en">${r.en}</div>
    <div class="r-name-ja">${r.ja}</div>
    <div class="r-card">
      <div class="r-tagline">${r.tl.replace(/\n/g,'<br>')}</div>
      <div class="line"></div>
      <div class="r-sec"><div class="r-sec-label">◆ 恋愛傾向</div><div class="r-sec-text">${r.love}</div></div>
      <div class="r-sec"><div class="r-sec-label">◆ 沼るパターン</div><div class="r-sec-text">${r.trap}</div></div>
      <div class="r-sec"><div class="r-sec-label">◆ あなたへの言葉</div><div class="r-sec-text">${r.note}</div></div>
    </div>
    <div class="share-box">
      <div class="share-label">▶ シェア用テキスト（自動生成）</div>
      <div class="share-text" id="st">${shareText.replace(/\\n/g,'\n')}</div>
    </div>
    <div class="share-btns">
      <a class="btn-sns" href="https://twitter.com/intent/tweet?text=${enc}" target="_blank">𝕏 でシェア</a>
      <a class="btn-sns" href="https://www.threads.net/intent/post?text=${enc}" target="_blank">Threads でシェア</a>
    </div>
    <button class="btn-copy" id="cpbtn" onclick="copyShare()">テキストをコピーする</button>
    <button class="btn-retry" onclick="start()">もう一度診断する</button><p class="note-cta">
  詳しい恋愛解剖はこちら<br>
  <a href="https://note.com/kuroki_karen/n/n218cdfca4799?sub_rt=share_pw" target="_blank">▷ note で読む</a><br><br>
  <span style="opacity:.45;font-size:10px;letter-spacing:.08em;">
    制作者 <a href="https://x.com/kuroki_karen" target="_blank" style="color:inherit;">@kuroki_karen</a>
  </span>
</p>
  `);
}

function copyShare(){
  const t=document.getElementById('st').innerText;
  const b=document.getElementById('cpbtn');
  navigator.clipboard.writeText(t).then(()=>{
    b.textContent='コピーしました ✓';
    b.classList.add('done');
    setTimeout(()=>{
      b.textContent='テキストをコピーする';
      b.classList.remove('done');
    },2500);
  }).catch(()=>{
    b.textContent='手動でコピーしてください';
  });
}

showTitle();
</script>
</body>
</html>
